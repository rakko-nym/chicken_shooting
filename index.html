<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シューティング</title>
    <style>
        /* ブラウザの隙間をすべて消す魔法のCSS */
        body {
            margin: 0;
            overflow: hidden; /* 画面のスクロールを完全に禁止 */
            position: fixed;  /* 画面を固定 */
            width: 100%;
            height: 100%;
            background-color: black;
}
        canvas {
            display: block; /* 画像の下にできる謎の隙間を消す */
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
</head>
<body>
    <canvas id="shooting"></canvas>
    <script src = 'shoot.js' defer></script>
</body>
</html>
